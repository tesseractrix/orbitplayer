<!DOCTYPE html>

  <link rel="stylesheet" href="css/styles.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    h2 {
      padding-left: 12px;
      margin-top: 20px;
      font-size: 18px;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 10px;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .card {
      flex: 0 0 75%;
      scroll-snap-align: start;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card p {
      margin-top: 6px;
      font-size: 14px;
      text-align: center;
    }

    .card:active {
      transform: scale(0.97);
    }

    @media (min-width: 768px) {
      .card {
        flex: 0 0 200px;
      }
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>

</head>
