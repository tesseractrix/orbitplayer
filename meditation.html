           <script>
var data = [];

fetch('podcast_map.txt')
  .then(response => response.json())
  .then(json => {
    data = json;
    console.log("Podcasts carregados:", data);

    renderList();   // cria lista
    playRandom();   // inicia player
  })
  .catch(error => console.error("Erro ao carregar podcasts:", error));
</script>
